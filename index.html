<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📝 To-Do List</h1>

    <div class="top-bar">
        <input type="text" id="searchInput" placeholder="Search task...">
        <button id="themeBtn">🌙</button>
    </div>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <div class="stats">
        <span>Total: <span id="total">0</span></span>
        <span>Completed: <span id="completed">0</span></span>
        <span>Pending: <span id="pending">0</span></span>
    </div>

    <button class="clear-btn" onclick="deleteCompleted()">
        Delete Completed
    </button>

    <ul id="taskList"></ul>
</div>

  

<script src="script.js"></script>

</body>
</html>
